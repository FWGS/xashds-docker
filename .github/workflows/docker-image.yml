name: Docker Image CI

on:
  push:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to GitHub Container Registry
      if: github.event_name != 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Construct image tag
      id: tags
      run: echo "date_tag=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      if: github.event_name != 'push'
      run: |
        docker build . --file Dockerfile --tag ghcr.io/fwgs/xashds-hldm:${{ steps.tags.outputs.date_tag }} --tag ghcr.io/fwgs/xashds-hldm:latest
        docker push ghcr.io/fwgs/xashds-hldm:${{ steps.tags.outputs.date_tag }}
        docker push ghcr.io/fwgs/xashds-hldm:latest
    
    - name: Build Docker image
      if: github.event_name == 'push'
      run: |
        docker build . --file Dockerfile --tag xashds:${{ steps.tags.outputs.date_tag }}
