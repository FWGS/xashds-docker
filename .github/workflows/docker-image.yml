name: Docker Image CI

on:
  push:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    
    - name: Login to Docker Hub
      if: github.event_name != 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_LOGIN }}
        password: ${{ secrets.DOCKER_API_TOKEN }}
    
    - name: Construct image tag
      id: tags
      run: echo "date_tag=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      if: github.event_name != 'push'
      run: |
        docker build . --file Dockerfile --tag snmetamorph/xashds-hldm:${{ steps.tags.outputs.date_tag }} --tag snmetamorph/xashds-hldm:latest
        docker push snmetamorph/xashds-hldm:${{ steps.tags.outputs.date_tag }}
        docker push snmetamorph/xashds-hldm:latest
    
    - name: Build Docker image
      if: github.event_name == 'push'
      run: |
        docker build . --file Dockerfile --tag xashds:${{ steps.tags.outputs.date_tag }}
